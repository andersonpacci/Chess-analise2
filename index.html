<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste Stockfish</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 12px; }
    pre, input, button { width: 100%; box-sizing: border-box; font-size: 16px; }
    input { padding: 10px; margin-bottom: 10px; }
    button { padding: 12px; margin-bottom: 10px; }
    pre { background: #f4f4f4; padding: 10px; min-height: 180px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <button id="testar">Testar engine</button>
  <pre id="saida">Aguardando...</pre>

  <script>
    const saida = document.getElementById('saida');
    const botao = document.getElementById('testar');
    const wasmSupported = typeof WebAssembly === 'object' && WebAssembly.validate(Uint8Array.of(0,97,115,109,1,0,0,0));
    const engine = new Worker(wasmSupported ? 'stockfish.wasm.js' : 'stockfish.js');

    const log = (t) => saida.textContent += '
' + t;

    engine.onmessage = (e) => {
      const msg = String(e.data || '');
      log(msg);
    };

    engine.onerror = (e) => {
      log('ERRO: ' + e.message);
    };

    botao.onclick = () => {
      saida.textContent = 'Enviando comandos...';
      engine.postMessage('uci');
      setTimeout(() => engine.postMessage('isready'), 500);
      setTimeout(() => engine.postMessage('quit'), 1500);
    };
  </script>
</body>
</html>
