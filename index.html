<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste Stockfish</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 12px; }
    button, pre { width: 100%; box-sizing: border-box; font-size: 16px; }
    button { padding: 12px; margin-bottom: 10px; }
    pre { background: #f4f4f4; padding: 10px; min-height: 220px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <button id="testar">Testar engine</button>
  <pre id="saida">Aguardando...</pre>

  <script>
    const saida = document.getElementById('saida');
    const botao = document.getElementById('testar');

    function log(t) {
      saida.textContent += '
' + t;
    }

    const engine = new Worker('stockfish.js');

    engine.onmessage = (e) => {
      log(String(e.data || ''));
    };

    engine.onerror = (e) => {
      log('ERRO: ' + e.message);
    };

    botao.onclick = () => {
      saida.textContent = 'Enviando UCI...';
      engine.postMessage('uci');
      setTimeout(() => engine.postMessage('isready'), 300);
      setTimeout(() => engine.postMessage('position startpos'), 600);
      setTimeout(() => engine.postMessage('go depth 8'), 900);
    };
  </script>
</body>
</html>
